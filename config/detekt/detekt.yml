config:
  validation: true
  warningsAsErrors: true
  excludes: []

style:
  BracesOnIfStatements:
    active: true
  ForbiddenComment:
    active: true
    comments:
      - reason: Resolve before merge.
        value: "TODO:"
      - reason: Resolve before merge.
        value: "FIXME:"
  WildcardImport:
    active: true
    excludeImports: []

exceptions:
  NotImplementedDeclaration:
    active: true

complexity:
  LargeClass:
    excludes:
      - '**/src/test/**'
      - '**/src/*Test/**'
  LongMethod:
    excludes:
      - '**/src/test/**'
      - '**/src/*Test/**'
  LongParameterList:
    active: false
  NamedArguments:
    active: true
  NestedScopeFunctions:
    active: true
  TooManyFunctions:
    active: true
    excludes:
      - '**/src/test/**'
      - '**/src/*Test/**'
    allowedFunctionsPerClass: 15
    allowedFunctionsPerObject: 15

potential-bugs:
  DontDowncastCollectionTypes:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: true

naming:
  BooleanPropertyNaming:
    active: true
    allowedPattern: '^(is|has|are)'

ktlint:
  active: true
  BlankLineBetweenWhenConditions:
    active: false
  ClassSignature:
    active: false
  FunctionSignature:
    active: false
  FunctionExpressionBody:
    active: false
  Kdoc:
    active: false
  NoBlankLineBeforeRbrace:
    active: true
  NoBlankLineInList:
    active: true
  NoConsecutiveBlankLines:
    active: true
  NoWildcardImports:
    # Intentionally disabled to avoid duplicate violations with style.WildcardImport.
    active: false
  PropertyName:
    active: false
  TrailingCommaOnCallSite:
    active: false
  TrailingCommaOnDeclarationSite:
    active: false
