# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

permissions:
  contents: read

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-disabled: true
    - name: Run detekt
      run: ./gradlew detekt

  build:
    name: ${{ matrix.target }} (${{ matrix.kind }})
    strategy:
      matrix:
        include:
          - target: :gradle-plugin:test
            kind: test
            os: ubuntu-latest
          - target: :gradle-plugin:validatePlugins
            kind: test
            os: ubuntu-latest
          - target: :gradle-plugin:checkPublicApiDocs
            kind: docs
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-disabled: true
    - name: Build with Gradle
      run: |
        if [ "${{ matrix.target }}" = ":gradle-plugin:checkPublicApiDocs" ]; then
          ./gradlew ${{ matrix.target }} --no-configuration-cache
        else
          ./gradlew ${{ matrix.target }}
        fi
    - name: Upload coverage to Codecov
      if: matrix.target == ':gradle-plugin:test'
      uses: codecov/codecov-action@v5
      with:
        files: ./gradle-plugin/build/reports/jacoco/test/jacocoTestReport.xml
        fail_ci_if_error: true
        flags: gradle-plugin
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true
