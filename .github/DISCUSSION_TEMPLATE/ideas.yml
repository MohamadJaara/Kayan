body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        This is a good place for new features, API ideas, workflow improvements, and early design thoughts.

        If the work is already clearly scoped and ready to track, an issue may be a better fit.

  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What would you like to see?
      placeholder: I’d like Kayan to support...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this solve? What are you trying to do?
      placeholder: This would help when...
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Possible direction
      description: Share a rough idea for the API, behavior, or user experience if you have one.
      placeholder: Maybe this could work like...
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Add code, config, screenshots, or links if helpful.
      render: markdown
      placeholder: |
        ```kotlin
        // optional
        ```
    validations:
      required: false

  - type: textarea
    id: concerns
    attributes:
      label: Tradeoffs or open questions
      description: Anything unclear, risky, or still open?
      placeholder: I’m not sure about...
    validations:
      required: false
